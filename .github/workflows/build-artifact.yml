name: Build and push Docker image

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
      - name: Build image
        run: |
          docker build . -t ghcr.io/${{ github.repository_owner }}/nest-app:${IMAGE_TAG} --target prod-distroless
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/nest-app:${IMAGE_TAG}
