name: Build and push Docker image

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/nest-app:${IMAGE_TAG}
          docker build . -t $IMAGE --target prod-distroless
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/nest-app:${IMAGE_TAG}
      - name: Get digest
        run: DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE | cut -d'@' -f2)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
      - name: Create release manifest
        run: |
          cat <<EOF > release-manifest.json
          {
           "commit": "${IMAGE_TAG}",
           "createdAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "services": {
             "orders_service": {
                "image": "${IMAGE}",
                "digest": "${DIGEST}"
              }
            }
          } 
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  

