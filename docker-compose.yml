version: '3.9'

services:
  postgres:
    env_file: ".env"
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - nestjs-course

  minio:
    env_file: ".env"
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_bucket:/data

  minio-init:
    env_file: ".env"
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${BUCKET:-lesson9-files-private};
      mc anonymous set none local/${BUCKET:-lesson9-files-private};
      echo 'minio bucket is ready';
      "

volumes:
  postgres_data:
  minio_bucket:

networks:
  nestjs-course: