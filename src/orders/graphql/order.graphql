scalar DateTime

type Order {
    id: String!
    deliveryAddress: String!
    user: User!
    orderItems: [OrderItems!]!
    orderStatus: OrderStatus!
    createdAt: DateTime!
}

enum OrderStatusInput {
    NEW
    PENDING_PAYMENT
    PROCESSING
    DELIVERED
    CANCELLED
    RETURNED
}

input OrdersFilterInput {
    status: OrderStatusInput
    dateFrom: DateTime
    dateTo: DateTime
}

input OrdersPaginationInput {
    limit: Int
    offset: Int
}

type OrdersPagination {
    limit: Int
    offset: Int
}

type OrdersResponse {
    nodes: [Order]
    pageInfo: OrdersPagination
    totalCount: Int
}

type Query {
    order(id: String!): Order

    orders(filter: OrdersFilterInput, pagination: OrdersPaginationInput): OrdersResponse
}
